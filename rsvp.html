<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Interest List – Woodlawn Reunion</title>
    <meta name="description" content="Interest list form for the Woodlawn Class of 2006 reunion. Collect alumni information and preferences.">
    <link rel="stylesheet" href="style.css">
</head>
<body class="branch-page">
    <!-- Navigation (same as index) -->
    <nav>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="index.html#sound">The Sound</a></li>
            <li><a href="index.html#look">The Look</a></li>
            <li><a href="index.html#energy">The Energy</a></li>
            <li><a href="rsvp.html">Interest List</a></li>
            <li><a href="scholarship.html">Scholarship</a></li>
            <li><a href="vendors.html">Vendors / Sponsors</a></li>
            <li><a href="faq.html">FAQ</a></li>
        </ul>
        <a class="cta primary" href="rsvp.html">Join the Interest List</a>
        <button class="mobile-menu-btn">☰</button>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1 class="hero-title">Join the Interest List</h1>
            <p class="hero-subtitle">Help shape the reunion experience. Tell us how you'd like to get involved.</p>
        </div>
    </header>

    <main class="container flow-container glass-card">
        <h2 class="section-title">Alumni Interest Form</h2>
        <!-- FORM ACTION PLACEHOLDER: Create a Formspree account for woodlawn06commitee@gmail.com, then paste the generated Form ID below -->
        <form action="https://formspree.io/f/your-form-id" method="POST" id="interest-form">
            <div class="input-group">
                <label for="firstName">First Name</label>
                <input type="text" id="firstName" name="firstName" required placeholder="Jane">
            </div>
            <div class="input-group">
                <label for="lastName">Last Name (Maiden)</label>
                <input type="text" id="lastName" name="lastName" required placeholder="Doe">
            </div>
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="jane@example.com">
            </div>
            <div class="input-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" placeholder="(410) 555-0106">
            </div>
            <div class="input-group">
                <label for="classYear">Class Year</label>
                <select id="classYear" name="classYear" required>
                    <option value="" disabled selected>Select Year</option>
                    <option value="2004">2004</option>
                    <option value="2005">2005</option>
                    <option value="2006">2006</option>
                    <option value="2007">2007</option>
                    <option value="2008">2008</option>
                </select>
            </div>
            <div class="input-group">
                <label>Interested in bringing a guest?</label>
                <select name="guestInterest" required>
                    <option value="" disabled selected>Select</option>
                    <option value="yes">Yes</option>
                    <option value="no">No</option>
                    <option value="maybe">Maybe</option>
                </select>
            </div>
            <div class="input-group">
                <label>Interested in volunteering?</label>
                <select name="volunteerInterest" required>
                    <option value="" disabled selected>Select</option>
                    <option value="yes">Yes</option>
                    <option value="no">No</option>
                    <option value="maybe">Maybe</option>
                </select>
            </div>
            <div class="input-group">
                <label>Interested in vending or sponsoring?</label>
                <select name="vendorInterest" required>
                    <option value="" disabled selected>Select</option>
                    <option value="yes">Yes</option>
                    <option value="no">No</option>
                    <option value="maybe">Maybe</option>
                </select>
            </div>
            <div class="input-group">
                <label for="songRequest">Song Request</label>
                <input type="text" id="songRequest" name="songRequest" placeholder="Your favorite 2006 track...">
            </div>
            <div class="input-group">
                <label for="photoInterest">Memory/Photo Submission Interest</label>
                <select name="photoInterest" required>
                    <option value="" disabled selected>Select</option>
                    <option value="yes">Yes</option>
                    <option value="no">No</option>
                </select>
            </div>
            <div class="input-group">
                <label for="notes">Additional Notes</label>
                <textarea id="notes" name="notes" rows="4" placeholder="Anything else you’d like us to know..."></textarea>
            </div>
            <button type="submit" class="cta-button">Submit Interest</button>
        </form>
    </main>

    <!-- Sticky Mobile CTA -->
    <a href="rsvp.html" class="sticky-cta">✦ Join the Interest List</a>

    <script src="main.js"></script>
</body>
</html>
