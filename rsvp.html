<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSVP & Registration | Woodlawn 2006</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="min-height: 100vh; display: flex; flex-direction: column;">

    <nav style="padding: var(--space-m); text-align: center;">
        <a href="deposit.html" style="color: var(--razr-silver); text-decoration: none; font-weight: 700;">&larr; BACK TO DEPOSITS</a>
    </nav>

    <main class="container flow-container glass-card" style="margin-top: 0;" data-reveal>
        <div style="text-align: center; margin-bottom: var(--space-m);">
            <h1 style="color: var(--warrior-gold);">ALUMNI RSVP</h1>
            <p style="color: var(--razr-silver);">Complete your registration to secure your deposit.</p>
        </div>

        <form action="confirmation.html" method="GET">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-m);">
                <div class="input-group">
                    <label for="firstName">First Name</label>
                    <input type="text" id="firstName" name="firstName" required placeholder="Jane">
                </div>
                <div class="input-group">
                    <label for="lastName">Last Name (Maiden)</label>
                    <input type="text" id="lastName" name="lastName" required placeholder="Doe">
                </div>
            </div>

            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="jane@example.com">
            </div>

            <div class="input-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" placeholder="(410) 555-0106">
            </div>

            <div class="input-group">
                <label for="tier">Selected Tier</label>
                <select id="tier" name="tier">
                    <option value="early">Early Deposit ($25)</option>
                    <option value="standard">Standard Deposit ($50)</option>
                </select>
            </div>

            <div style="text-align: center; margin-top: var(--space-l);">
                <button type="submit" class="cta-button" style="width: 100%; cursor: pointer; border: none; font-size: 1.2rem;">PROCEED TO PAYMENT &rarr;</button>
            </div>
        </form>
    </main>

    <footer style="padding: var(--space-m) 0; text-align: center;">
        <p style="opacity: 0.5;">&copy; 2026 Woodlawn High School Class of 2006.</p>
    </footer>

    <script src="main.js"></script>
    <script>
        // Auto-select tier based on URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const tier = urlParams.get('tier');
        if(tier) {
            const select = document.getElementById('tier');
            if(select.querySelector(`option[value="${tier}"]`)) {
                select.value = tier;
            }
        }
    </script>
</body>
</html>
